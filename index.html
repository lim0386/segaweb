<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>p5.js Sketch</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="sketch.js" defer></script>
</head>
<body>
  <!-- 대표 교수 창 -->
  <section id="professor-card">
    <img src="yklim.jpg" alt="임양규 교수 사진" id="professor-photo">
    <div>
      <h2 id="professor-name">임양규 교수</h2>
      <p id="professor-title">연구실 대표 교수</p>
      <p id="professor-email">Email: trumpetyk09@duksung.ac.kr</p>
    </div>
  </section>
  <!-- 박사과정 심보광 카드 -->
  <section class="student-card">
    <div class="student-row">
      <div class="student-profile">
        <img src="bkshim.jpg" alt="심보광 사진" class="student-photo">
        <div class="student-info">
          <h3 class="student-name">심보광 박사과정</h3>
          <p class="student-title">박사과정</p>
          <p class="student-email">Email: simbokwang@duksung.ac.kr</p>
        </div>
      </div>
      <div class="student-profile">
        <img src="mmh.jpg" alt="문민혜 사진" class="student-photo">
        <div class="student-info">
          <h3 class="student-name">문민혜</h3>
          <p class="student-title">석사과정</p>
          <p class="student-email">Email: moonminhye@duksung.ac.kr</p>
        </div>
      </div>
      <div class="student-profile">
        <img src="shseo.jpg" alt="서수현 사진" class="student-photo">
        <div class="student-info">
          <h3 class="student-name">서수현</h3>
          <p class="student-title">석사과정</p>
          <p class="student-email">Email: watermu@duksung.ac.kr</p>
        </div>
      </div>
    </div>
  </section>
  <main>
    <h1>p5.js Sketch</h1>
    <div id="canvas-container"></div>
  </main>
</body>
</html>
