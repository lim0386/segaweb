김영한 사진을 student-card에 추가하려면 'kyhkim.jpg' 파일이 필요합니다. 아래는 예시 코드입니다. (이미지가 없다면 alt 텍스트만 표시됩니다)

<div class="student-profile">
  <img src="kyhkim.jpg" alt="김영한 사진" class="student-photo">
  <div class="student-info">
    <h3 class="student-name">김영한</h3>
    <p class="student-title">석사과정</p>
    <p class="student-email">Email: younghan.kim@duksung.ac.kr</p>
  </div>
</div>

이 코드를 문민혜와 보티존 카드 사이에 삽입하세요.
